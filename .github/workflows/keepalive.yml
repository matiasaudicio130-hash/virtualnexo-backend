name: Keep Railway alive

on:
  schedule:
    # Cada 10 minutos — mínimo permitido por GitHub Actions
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            https://api-production-a7d3.up.railway.app/health)
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "WARNING: health check returned $STATUS"
          fi
