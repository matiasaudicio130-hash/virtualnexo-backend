name: Deploy — Aura SW

on:
  push:
    branches: [master]

jobs:
  backend:
    name: Backend → Railway
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g @railway/cli
      - run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PROJECT_TOKEN }}

  frontend:
    name: Frontend → Vercel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

      - name: Deploy + alias aurasw.club
        run: |
          # Deploy y capturar URL
          DEPLOY_URL=$(npx vercel --token ${{ secrets.VERCEL_TOKEN }} --yes --prod 2>&1 | grep -o 'https://frontend-[^ ]*\.vercel\.app' | tail -1)
          echo "Deployed: $DEPLOY_URL"

          # Obtener deploy ID
          DEPLOY_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            "https://api.vercel.com/v6/deployments?projectId=${{ secrets.VERCEL_PROJECT_ID }}&limit=1" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['deployments'][0]['uid'])")

          echo "Deploy ID: $DEPLOY_ID"

          # Borrar alias viejo y crear nuevo
          ALIAS_UID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            "https://api.vercel.com/v4/aliases?domain=aurasw.club&projectId=${{ secrets.VERCEL_PROJECT_ID }}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); a=[x for x in d.get('aliases',[]) if x['alias']=='aurasw.club']; print(a[0]['uid'] if a else '')" 2>/dev/null)

          [ -n "$ALIAS_UID" ] && curl -s -X DELETE \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            "https://api.vercel.com/v2/aliases/$ALIAS_UID" > /dev/null

          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.vercel.com/v2/deployments/$DEPLOY_ID/aliases" \
            -d '{"alias":"aurasw.club"}'

          echo "✓ aurasw.club → $DEPLOY_ID"
