name: Deploy — Aura SW

# Deploya automáticamente en cada push a master
# Backend → Railway (railway up desde directorio backend/)
# Frontend → Vercel (build + deploy --prod + alias aurasw.club)

on:
  push:
    branches: [master]

jobs:
  # ── Backend → Railway ──────────────────────────────────────────
  deploy-backend:
    name: Backend (Railway)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PROJECT_TOKEN }}
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID }} --detach
        # --detach: no espera el build (Railway buildea async)
        # Para ver logs: Railway dashboard → Deployments

  # ── Frontend → Vercel ──────────────────────────────────────────
  deploy-frontend:
    name: Frontend (Vercel)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # Usa frontend/.env.production para VITE_API_URL

      - name: Deploy to Vercel (prebuilt)
        id: deploy
        run: |
          DEPLOY_URL=$(npx vercel --token ${{ secrets.VERCEL_TOKEN }} \
            --yes --prod --prebuilt 2>&1 | grep -o 'https://[^ ]*vercel\.app' | head -1)
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $DEPLOY_URL"

      - name: Alias aurasw.club to new deployment
        run: |
          # Obtener el ID del deploy más reciente
          DEPLOY_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            "https://api.vercel.com/v6/deployments?projectId=${{ secrets.VERCEL_PROJECT_ID }}&limit=1" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['deployments'][0]['uid'])")

          echo "Deploy ID: $DEPLOY_ID"

          # Borrar alias actual y re-crear apuntando al deploy nuevo
          ALIAS_UID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            "https://api.vercel.com/v4/aliases?domain=aurasw.club&projectId=${{ secrets.VERCEL_PROJECT_ID }}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); a=[x for x in d.get('aliases',[]) if x['alias']=='aurasw.club']; print(a[0]['uid'] if a else '')")

          if [ -n "$ALIAS_UID" ]; then
            curl -s -X DELETE \
              -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
              "https://api.vercel.com/v2/aliases/$ALIAS_UID"
            echo "Old alias removed"
          fi

          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.vercel.com/v2/deployments/$DEPLOY_ID/aliases" \
            -d '{"alias":"aurasw.club"}'

          echo "aurasw.club → $DEPLOY_ID"
